name: iq_core
description: Shared core package for IQ Taxi apps (Passenger & Driver)
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Networking
  dio: ^5.8.0
  retrofit: ^4.4.2

  # Local Storage
  shared_preferences: ^2.5.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^15.1.2

  # Maps & Location
  google_maps_flutter: ^2.12.1
  google_maps_flutter_android: ^2.14.11
  google_maps_flutter_platform_interface: ^2.9.5
  geolocator: ^14.0.0
  geocoding: ^3.0.0

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  firebase_messaging: ^15.2.4
  cloud_firestore: ^5.6.5

  # UI
  flutter_zoom_drawer: ^3.2.0
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.1

  # Utilities
  dartz: ^0.10.1
  internet_connection_checker: ^3.0.1
  intl: ^0.20.2
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  share_plus: ^10.1.4
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  logger: ^2.5.0
  flutter_dotenv: ^5.2.1
  socket_io_client: ^3.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.15
  json_serializable: ^6.9.4
  freezed: ^2.5.8
  injectable_generator: ^2.7.0
  retrofit_generator: ^9.1.10
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
