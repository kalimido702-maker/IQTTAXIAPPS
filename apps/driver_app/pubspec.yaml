name: iq_taxi_driver
description: IQ Taxi - Driver App
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Shared Core Package
  iq_core:
    path: ../../packages/iq_core

  # Additional driver-specific dependencies
  flutter_bloc: ^9.1.0
  go_router: ^15.1.2
  flutter_screenutil: ^5.9.3
  get_it: ^8.0.3
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/svg/

  fonts:
    - family: Almarai
      fonts:
        - asset: assets/fonts/Almarai-Regular.ttf
        - asset: assets/fonts/Almarai-Bold.ttf
          weight: 700
        - asset: assets/fonts/Almarai-Light.ttf
          weight: 300
        - asset: assets/fonts/Almarai-ExtraBold.ttf
          weight: 800

    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Variable.ttf
        - asset: assets/fonts/Outfit-Variable.ttf
          weight: 500
        - asset: assets/fonts/Outfit-Variable.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Variable.ttf
          weight: 700

    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Variable.ttf
          weight: 500
